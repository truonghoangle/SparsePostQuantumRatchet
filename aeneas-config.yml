# Aeneas extraction configuration

aeneas:
  commit: "1180be60" # pinned commit hash
  repo: "https://github.com/AeneasVerif/aeneas.git"

# Upstream Rust crate we are verifying
upstream:
  repo: "https://github.com/signalapp/SparsePostQuantumRatchet"
  commit: "f2589fef855c10f39d72634dab3d14654dd410bf"

crate:
  dir: "." # path to Rust crate
  name: "spqr" # package name

charon:
  preset: "aeneas"
  hide_marker_traits: true
  cargo_args: ["--features", "extraction"]
  start_from:
    - "spqr::util"
    - "spqr::encoding"
    - "spqr::serialize"
    - "spqr::incremental_mlkem768"
    - "spqr::proto"
    - "spqr::kdf"
    - "spqr::chain"
    - "spqr::authenticator"
    - "spqr::v1"
  exclude:
    - "spqr::encoding::gf::check_accelerated" # cpufeatures macro: arrow types unsupported by Aeneas
    - "spqr::encoding::gf::accelerated" # platform-specific SIMD intrinsics
    - "log" # log crate internals cause Aeneas error
    - "spqr::incremental_mlkem768::potentially_fix_state_incorrectly_encoded_by_libcrux_issue_1275"
    - "spqr::proto::_::{impl core::fmt::Debug for _}"
    - "spqr::proto::_::_::{impl core::fmt::Debug for _}"
    - "spqr::proto::_::_::_::{impl core::fmt::Debug for _}"
    - "spqr::proto::_::{impl core::hash::Hash for _}"
    - "spqr::proto::_::_::{impl core::hash::Hash for _}"
    - "spqr::proto::_::_::_::{impl core::hash::Hash for _}"
    - "spqr::proto::_::_::{impl core::cmp::PartialEq for _}" # prost-generated, Aeneas type mismatch
    - "spqr::proto::_::_::_::{impl core::cmp::PartialEq for _}"
    - "spqr::proto::_::_::{impl core::cmp::Eq for _}"
    - "spqr::proto::_::_::_::{impl core::cmp::Eq for _}"
    - "spqr::proto::_::_::{impl core::marker::StructuralPartialEq for _}"
    - "spqr::proto::_::_::_::{impl core::marker::StructuralPartialEq for _}"
  opaque:
    - "spqr::kdf::hkdf_to_slice"
    - "spqr::incremental_mlkem768::encaps2" # uses log macros internally
    - "spqr::encoding::gf::check_accelerated"
    - "spqr::encoding::gf::accelerated"
    - "spqr::encoding::gf::mul2_u16" # dispatches to excluded accelerated code
    - "spqr::encoding::gf::{core::ops::arith::MulAssign<&spqr::encoding::gf::GF16> for spqr::encoding::gf::GF16}"
    - "spqr::encoding::polynomial::{spqr::encoding::Decoder for spqr::encoding::polynomial::PolyDecoder}::decoded_message" # Aeneas internal error
    - "spqr::proto::_::{impl prost::message::Message for _}"
    - "spqr::proto::_::_::{impl prost::message::Message for _}"
    - "spqr::proto::_::_::_::{impl prost::message::Message for _}"

aeneas_args:
  options:
    - split-files
  dest: "." # output directory (project root)
  subdir: "Spqr/Code" # sub-folder for files (sets import paths to Spqr.Code.*)

# Post-extraction find/replace applied to generated Lean files.
tweaks:
  files: ["Types.lean", "Funs.lean"]
  substitutions:
    # Normalize absolute build paths in Source comments so they are reproducible across machines
    - regex: "Source: '[^']*/target/[^']*/out/"
      replace: "Source: 'target/out/"

    # Disable long line linter for auto-generated files
    - find: |
        set_option linter.unusedVariables false
      replace: |
        set_option linter.unusedVariables false
        set_option linter.style.longLine false
        set_option linter.style.setOption false
        set_option linter.style.whitespace false

    # Insert Pt trait instances into Types.lean after the Pt struct definition
    - find: |
        structure encoding.polynomial.Pt where
          x : encoding.gf.GF16
          y : encoding.gf.GF16

        /-- [spqr::encoding::polynomial::Poly]
      replace: |
        structure encoding.polynomial.Pt where
          x : encoding.gf.GF16
          y : encoding.gf.GF16

        -- Pt trait instances (moved here from Funs.lean because PolyDecoder references
        -- encoding.polynomial.Pt.Insts.CoreCmpOrd in its type signature)

        def encoding.polynomial.Pt.Insts.CoreCmpPartialEqPt.eq
          (self other : encoding.polynomial.Pt) : Result Bool := do
          ok (self.x.value = other.x.value)

        @[reducible]
        def encoding.polynomial.Pt.Insts.CoreCmpPartialEqPt :
          core.cmp.PartialEq encoding.polynomial.Pt encoding.polynomial.Pt := {
          eq := encoding.polynomial.Pt.Insts.CoreCmpPartialEqPt.eq
        }

        def encoding.polynomial.Pt.Insts.CoreCmpEq.assert_receiver_is_total_eq
          (_self : encoding.polynomial.Pt) : Result Unit := ok ()

        @[reducible]
        def encoding.polynomial.Pt.Insts.CoreCmpEq :
          core.cmp.Eq encoding.polynomial.Pt := {
          partialEqInst := encoding.polynomial.Pt.Insts.CoreCmpPartialEqPt
          assert_receiver_is_total_eq :=
            encoding.polynomial.Pt.Insts.CoreCmpEq.assert_receiver_is_total_eq
        }

        def encoding.polynomial.Pt.Insts.CoreCmpPartialOrdPt.partial_cmp
          (self other : encoding.polynomial.Pt) : Result (Option Ordering) := do
          let o ← lift (core.cmp.impls.OrdU16.cmp self.x.value other.x.value)
          ok (some o)

        @[reducible]
        def encoding.polynomial.Pt.Insts.CoreCmpPartialOrdPt :
          core.cmp.PartialOrd encoding.polynomial.Pt encoding.polynomial.Pt := {
          partialEqInst := encoding.polynomial.Pt.Insts.CoreCmpPartialEqPt
          partial_cmp := encoding.polynomial.Pt.Insts.CoreCmpPartialOrdPt.partial_cmp
          lt := core.cmp.PartialOrd.lt.default
            encoding.polynomial.Pt.Insts.CoreCmpPartialOrdPt.partial_cmp
          le := core.cmp.PartialOrd.le.default
            encoding.polynomial.Pt.Insts.CoreCmpPartialOrdPt.partial_cmp
          gt := core.cmp.PartialOrd.gt.default
            encoding.polynomial.Pt.Insts.CoreCmpPartialOrdPt.partial_cmp
          ge := core.cmp.PartialOrd.ge.default
            encoding.polynomial.Pt.Insts.CoreCmpPartialOrdPt.partial_cmp
        }

        def encoding.polynomial.Pt.Insts.CoreCmpOrd.cmp
          (self other : encoding.polynomial.Pt) : Result Ordering := do
          let o ←
            encoding.polynomial.Pt.Insts.CoreCmpPartialOrdPt.partial_cmp self other
          core.option.Option.unwrap o

        @[reducible]
        def encoding.polynomial.Pt.Insts.CoreCmpOrd :
          core.cmp.Ord encoding.polynomial.Pt := {
          eqInst := encoding.polynomial.Pt.Insts.CoreCmpEq
          partialOrdInst := encoding.polynomial.Pt.Insts.CoreCmpPartialOrdPt
          cmp := encoding.polynomial.Pt.Insts.CoreCmpOrd.cmp
          max := core.cmp.Ord.max.default
            (encoding.polynomial.Pt.Insts.CoreCmpPartialOrdPt.lt)
          min := core.cmp.Ord.min.default
            (encoding.polynomial.Pt.Insts.CoreCmpPartialOrdPt.lt)
          clamp := core.cmp.Ord.clamp.default
            (encoding.polynomial.Pt.Insts.CoreCmpPartialOrdPt.le)
            (encoding.polynomial.Pt.Insts.CoreCmpPartialOrdPt.lt)
            (encoding.polynomial.Pt.Insts.CoreCmpPartialOrdPt.gt)
        }

        /-- [spqr::encoding::polynomial::Poly]

    # Remove Pt PartialEq + Eq from Funs.lean
    - regex: "/-- \\[spqr::encoding::polynomial::\\{core::cmp::PartialEq<spqr::encoding::polynomial::Pt>[\\s\\S]*?encoding\\.polynomial\\.Pt\\.Insts\\.CoreCmpEq\\.assert_receiver_is_total_eq\\n\\}\\n"
      replace: "-- Pt PartialEq and Eq instances moved to Types.lean\n"

    # Remove Pt PartialOrd + Ord from Funs.lean
    - regex: "/-- \\[spqr::encoding::polynomial::\\{core::cmp::PartialOrd<spqr::encoding::polynomial::Pt>[\\s\\S]*?cmp := encoding\\.polynomial\\.Pt\\.Insts\\.CoreCmpOrd\\.cmp\\n\\}\\n"
      replace: "-- Pt PartialOrd and Ord instances moved to Types.lean\n"

    # Strip map field from Iterator instances (Aeneas generates it but Lean backend doesn't have it)
    - regex: "\\n  map := fun \\{B : Type\\} \\{F : Type\\}[\\s\\S]*?(?=\\n  enumerate)"
      replace: ""

    # Replace collect field with take := sorry in Iterator instances
    - regex: "\\n  collect := fun \\{B : Type\\}[\\s\\S]*?(?=\\n\\})"
      replace: "\n  take := sorry"

    # Sorry proto enum partial_cmp bodies (PartialCmpI32 doesn't exist in Aeneas stdlib)
    - find: "ok (core.cmp.impls.PartialCmpI32.partial_cmp self1 other1)"
      replace: "sorry"

    # Add missing fields to proto enum PartialOrd instances
    - regex: "(partial_cmp :=\\n    proto\\.pq_ratchet\\.\\w+\\.Insts\\.CoreCmpPartialOrd\\w+\\.partial_cmp\\n)\\}"
      replace: "$1  lt := sorry\n  le := sorry\n  gt := sorry\n  ge := sorry\n}"

    # Add missing fields to proto enum Ord instances
    - regex: "(cmp := proto\\.pq_ratchet\\.\\w+\\.Insts\\.CoreCmpOrd\\.cmp\\n)\\}"
      replace: "$1  max := sorry\n  min := sorry\n  clamp := sorry\n}"

    # Sorry loop bodies where Aeneas generates () instead of the correct typed value
    - regex: "(def (?:encoding\\.gf\\.parallel_mult_loop\\.body|encoding\\.polynomial\\.lagrange_polys_for_complete_points_loop0\\.body|encoding\\.polynomial\\.PolyEncoder\\.from_pb_loop1\\.body|encoding\\.polynomial\\.PolyEncoder\\.encode_bytes_base_loop\\.body)\\n[\\s\\S]*?):= do[\\s\\S]*?(?=\\n/-- )"
      replace: "$1:= sorry"

    # Sorry merge closure FnOnce call_once assignments (Aeneas types them wrong)
    - regex: "call_once :=\\n    proto\\.pq_ratchet\\.\\S+\\.merge\\.closure\\S*\\.Insts\\.CoreOpsFunctionFnOnceTupleTupleTuple\\.call_once\\n    bytesbufbuf_implBufInst\\n}"
      replace: "call_once := sorry\n}"

    # Sorry merge function bodies (broken Result.map with mistyped closures)
    - regex: "(def proto\\.pq_ratchet\\.(?:pq_ratchet_state\\.Inner|v1_msg\\.InnerMsg|v1_state\\.InnerState)\\.merge\\n[\\s\\S]*?):= do[\\s\\S]*?(?=\\n/-- )"
      replace: "$1:= sorry"

    # Replace the auto-generated `GF16::Mul::mul` definition with a
    # concrete `MulAssign::mul_assign` body that delegates to the
    # unaccelerated multiplication routine. The `MulAssign` impl is marked
    # opaque in the extraction config (because the Rust source dispatches
    # to platform-specific SIMD code via `accelerated::mul`), but for
    # verification we want a concrete, unaccelerated definition. We also
    # re-emit the surrounding `Mul::mul` definition unchanged so the
    # downstream call sites still type-check.
    - find: |
        /-- [spqr::encoding::gf::{core::ops::arith::Mul<spqr::encoding::gf::GF16, spqr::encoding::gf::GF16> for spqr::encoding::gf::GF16}::mul]:
            Source: 'src/encoding/gf.rs', lines 515:4-519:5
            Visibility: public -/
        def encoding.gf.GF16.Insts.CoreOpsArithMulGF16GF16.mul
          (self : encoding.gf.GF16) (other : encoding.gf.GF16) :
          Result encoding.gf.GF16
          := do
          encoding.gf.GF16.Insts.CoreOpsArithMulAssignShared0GF16.mul_assign self other
      replace: |
        /-- [spqr::encoding::gf::{core::ops::arith::MulAssign<&0 (spqr::encoding::gf::GF16)> for spqr::encoding::gf::GF16}::mul_assign]:
            Source: 'src/encoding/gf.rs', lines 492:4-502:5
            Visibility: public -/
        def encoding.gf.GF16.Insts.CoreOpsArithMulAssignShared0GF16.mul_assign
          (self : encoding.gf.GF16) (other : encoding.gf.GF16) :
          Result encoding.gf.GF16
          := do
          let i ← encoding.gf.unaccelerated.mul self.value other.value
          ok { value := i }

        /-- [spqr::encoding::gf::{core::ops::arith::Mul<spqr::encoding::gf::GF16, spqr::encoding::gf::GF16> for spqr::encoding::gf::GF16}::mul]:
            Source: 'src/encoding/gf.rs', lines 515:4-519:5
            Visibility: public -/
        def encoding.gf.GF16.Insts.CoreOpsArithMulGF16GF16.mul
          (self : encoding.gf.GF16) (other : encoding.gf.GF16) :
          Result encoding.gf.GF16
          := do
          encoding.gf.GF16.Insts.CoreOpsArithMulAssignShared0GF16.mul_assign self other
